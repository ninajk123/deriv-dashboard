<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ninafx Dashboard</title>
</head>

<body style="font-family:Arial;text-align:center;padding-top:80px">

<h1>Ninafx Dashboard</h1>

<a href="https://oauth.deriv.com/oauth2/authorize?app_id=33B8TV783NLThvGjFGeE7">
<button style="padding:15px 30px;font-size:18px">
Login with Deriv
</button>
</a>

<h3 id="status">Not Connected</h3>

<p>Account: <span id="account">-</span></p>

<script>

const params = new URLSearchParams(window.location.search);

const token = params.get("token1");

if(token){

document.getElementById("status").innerText =
"Logged In";

const ws = new WebSocket(
"wss://ws.derivws.com/websockets/v3?app_id=1089"
);

ws.onopen = () => {

ws.send(JSON.stringify({
authorize: token
}));

};

ws.onmessage = (msg) => {

const data = JSON.parse(msg.data);

if(data.msg_type === "authorize"){

document.getElementById("account").innerText =
data.authorize.loginid;

}

};

}

</script>

</body>
</html>
